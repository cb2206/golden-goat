      <ellipse cx="354" cy="246" rx="44" ry="24" fill="url(#goldDk)" transform="rotate(28 354 246)"/>
    </g>
    <path d="M256 150 C322 150 352 214 346 282 C342 350 304 408 256 408 C208 408 170 350 166 282 C160 214 190 150 256 150 Z" fill="url(#gold)" stroke="#7a5a16" stroke-width="6"/>
    <ellipse cx="256" cy="350" rx="62" ry="48" fill="#fbe4a6" stroke="#7a5a16" stroke-width="5"/>
    <ellipse cx="232" cy="356" rx="9" ry="6" fill="#5b3c12"/><ellipse cx="280" cy="356" rx="9" ry="6" fill="#5b3c12"/>
    <ellipse cx="214" cy="268" rx="20" ry="24" fill="#2b1d08"/><ellipse cx="298" cy="268" rx="20" ry="24" fill="#2b1d08"/>
    <circle cx="221" cy="260" r="6" fill="#fff" opacity="0.9"/><circle cx="305" cy="260" r="6" fill="#fff" opacity="0.9"/>
    <path d="M232 398 C238 446 252 470 256 486 C260 470 274 446 280 398 C272 410 240 410 232 398 Z" fill="url(#goldDk)" stroke="#7a5a16" stroke-width="4"/>
    <path d="M210 175 C195 200 188 235 192 270" fill="none" stroke="#fff7df" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- sparkles -->
  <g fill="#fff7df">
    <path d="M700 150 l8 22 22 8 -22 8 -8 22 -8 -22 -22 -8 22 -8 z"/>
    <path d="M770 250 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 z" opacity="0.85"/>
    <path d="M660 330 l5 14 14 5 -14 5 -5 14 -5 -14 -14 -5 14 -5 z" opacity="0.7"/>
