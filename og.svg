<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#54b0e6"/>
      <stop offset="60%" stop-color="#2f7fc6"/>
      <stop offset="100%" stop-color="#1b4f97"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="48%" stop-color="#f4c64a"/>
      <stop offset="100%" stop-color="#cf941d"/>
    </linearGradient>
    <linearGradient id="goldDk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0cf78"/>
      <stop offset="100%" stop-color="#b07d1c"/>
    </linearGradient>
    <linearGradient id="horn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe0bb"/>
      <stop offset="100%" stop-color="#a9822f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffe9a8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffe9a8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- clouds -->
  <g fill="#ffffff" opacity="0.85">
    <ellipse cx="250" cy="120" rx="70" ry="26"/><ellipse cx="300" cy="108" rx="55" ry="28"/>
    <ellipse cx="950" cy="150" rx="80" ry="28"/><ellipse cx="1010" cy="138" rx="55" ry="26"/>
  </g>

  <!-- city skyline -->
  <g fill="#163e76">
    <rect x="40" y="360" width="95" height="200"/><rect x="150" y="300" width="78" height="260"/>
    <rect x="244" y="380" width="70" height="180"/>
    <rect x="880" y="330" width="80" height="230"/><rect x="978" y="288" width="96" height="272"/>
    <rect x="1090" y="356" width="78" height="204"/>
  </g>
  <g fill="#ffd86b" opacity="0.85">
    <rect x="60" y="380" width="14" height="16"/><rect x="92" y="380" width="14" height="16"/><rect x="60" y="420" width="14" height="16"/><rect x="100" y="430" width="14" height="16"/>
    <rect x="170" y="320" width="14" height="16"/><rect x="200" y="320" width="14" height="16"/><rect x="170" y="360" width="14" height="16"/><rect x="200" y="400" width="14" height="16"/>
    <rect x="1000" y="312" width="14" height="16"/><rect x="1034" y="312" width="14" height="16"/><rect x="1000" y="352" width="14" height="16"/><rect x="1034" y="392" width="14" height="16"/>
  </g>

  <!-- ground + road -->
  <rect x="0" y="500" width="1200" height="130" fill="#5fa247"/>
  <rect x="0" y="522" width="1200" height="58" fill="#54565b"/>
  <g fill="#eceae0"><rect x="80" y="548" width="70" height="7"/><rect x="300" y="548" width="70" height="7"/><rect x="520" y="548" width="70" height="7"/><rect x="740" y="548" width="70" height="7"/><rect x="960" y="548" width="70" height="7"/><rect x="1180" y="548" width="70" height="7"/></g>

  <!-- a little red car on the road -->
  <g transform="translate(880,470)">
    <rect x="0" y="22" width="120" height="34" rx="8" fill="#d23b3b"/>
    <rect x="20" y="2" width="74" height="26" rx="8" fill="#e25555"/>
    <rect x="30" y="6" width="54" height="18" rx="4" fill="#1b2630"/>
    <circle cx="28" cy="58" r="13" fill="#15151a"/><circle cx="92" cy="58" r="13" fill="#15151a"/>
    <circle cx="28" cy="58" r="5" fill="#bfc4c9"/><circle cx="92" cy="58" r="5" fill="#bfc4c9"/>
  </g>

