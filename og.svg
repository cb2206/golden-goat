  <ellipse cx="430" cy="300" rx="280" ry="280" fill="url(#glow)"/>
  <g transform="translate(190,46) scale(0.96)">
    <ellipse cx="256" cy="452" rx="150" ry="24" fill="#000" opacity="0.2"/>
    <g stroke="#7a5a16" stroke-width="5" stroke-linejoin="round">
      <path d="M196 182 C150 150 132 104 150 62 C120 96 110 150 132 196 C150 230 178 214 196 182 Z" fill="url(#horn)"/>
